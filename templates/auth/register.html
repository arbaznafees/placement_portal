{% extends "base.html" %}

{% block title %}Register - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4"><i class="bi bi-person-plus-fill"></i> Register</h2>
                
                <!-- Role Selection -->
                <div class="btn-group w-100 mb-4" role="group">
                    <input type="radio" class="btn-check" name="roleToggle" id="studentRadio" checked autocomplete="off">
                    <label class="btn btn-outline-primary" for="studentRadio" onclick="showStudentForm()">Student</label>

                    <input type="radio" class="btn-check" name="roleToggle" id="companyRadio" autocomplete="off">
                    <label class="btn btn-outline-primary" for="companyRadio" onclick="showCompanyForm()">Company</label>
                </div>

                <!-- Student Registration Form -->
                <form method="POST" id="studentForm">
                    <input type="hidden" name="role" value="student">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="roll_number" class="form-label">Roll Number *</label>
                            <input type="text" class="form-control" name="roll_number" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone *</label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="department" class="form-label">Department *</label>
                            <input type="text" class="form-control" name="department" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cgpa" class="form-label">CGPA *</label>
                            <input type="number" step="0.01" class="form-control" name="cgpa" min="0" max="10" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="graduation_year" class="form-label">Graduation Year *</label>
                            <input type="number" class="form-control" name="graduation_year" min="2020" max="2030" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="skills" class="form-label">Skills (comma-separated)</label>
                        <input type="text" class="form-control" name="skills" placeholder="Python, Java, React">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register as Student</button>
                </form>

                <!-- Company Registration Form -->
                <form method="POST" id="companyForm" style="display: none;">
                    <input type="hidden" name="role" value="company">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="company_name" class="form-label">Company Name *</label>
                            <input type="text" class="form-control" name="company_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hr_name" class="form-label">HR Name *</label>
                            <input type="text" class="form-control" name="hr_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hr_contact" class="form-label">HR Contact *</label>
                            <input type="tel" class="form-control" name="hr_contact" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="url" class="form-control" name="website" placeholder="https://example.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Company Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register as Company</button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>

<script>
function showStudentForm() {
    document.getElementById('studentForm').style.display = 'block';
    document.getElementById('companyForm').style.display = 'none';
}

function showCompanyForm() {
    document.getElementById('studentForm').style.display = 'none';
    document.getElementById('companyForm').style.display = 'block';
}
</script>
{% endblock %}
